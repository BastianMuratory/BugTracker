<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Bugtrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234338ca' stroke-width='1.8' stroke-linecap='round'%3E%3Cpath d='M8 6a4 4 0 0 1 8 0'/%3E%3Crect x='7' y='8' width='10' height='11' rx='5'/%3E%3Cpath d='M12 8v11M3 11h4M17 11h4M4 16h3M17 16h3M4 6h3M17 6h3'/%3E%3C/svg%3E">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas);
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 28px 26px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      margin-bottom: 22px;
      justify-content: center;
    }
    .login-brand svg { color: var(--accent); }
    .login-brand span { font-weight: 700; font-size: 1.1rem; letter-spacing: .02em; }
    .login-brand b { color: var(--accent); font-weight: 800; }
    .login-card h1 { font-size: 1.05rem; text-align: center; margin-bottom: 18px; color: var(--ink-2); font-weight: 600; }
    .login-card .field { margin-bottom: 14px; }
    .login-card label { display: block; font-size: .82rem; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
    .login-card input {
      width: 100%; font: inherit; padding: 10px 12px;
      border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    }
    .login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .login-card .btn { width: 100%; justify-content: center; margin-top: 6px; }
    .login-error {
      background: var(--danger-soft); color: var(--danger);
      border: 1px solid #eecaca; border-radius: var(--radius-sm);
      padding: 9px 12px; font-size: .85rem; margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6a4 4 0 0 1 8 0"/><rect x="7" y="8" width="10" height="11" rx="5"/>
          <path d="M12 8v11M3 11h4M17 11h4M4 16h3M17 16h3M4 6h3M17 6h3"/>
        </svg>
        <span>Bug<b>track</b></span>
      </div>
      <h1>Connexion requise</h1>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post">
        <div class="field">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Se connecter</button>
      </form>
    </div>
  </div>
</body>
</html>
